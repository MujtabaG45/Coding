name: SSH Devbox

on:
  workflow_dispatch:

jobs:
  ssh-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install .NET 9 and SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server wget
          wget https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt update
          sudo apt install -y dotnet-sdk-9.0

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          sudo sed -i 's/^#Port .*/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication .*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo service ssh start

      - name: Show IP (check this in logs)
        run: |
          echo "RUNNER IP:"
          curl ifconfig.me

      - name: Keep alive
        run: |
          echo "Devbox running. Connect via SSH." && tail -f /dev/null
