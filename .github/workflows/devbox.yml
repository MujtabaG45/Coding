name: Code Server Snapshots (Minute-wise + Discord Trigger)

on:
  schedule:
    - cron: "*/1 * * * *"  # Every 1 minute
  workflow_dispatch:
  repository_dispatch:
    types: [save_workspace]

jobs:
  codebox:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: 2QQn03lHEv4FSfWroH8VrQt5hAm_3o3Knf2Rc9PjdAG5doJoe
      NGROK_DOMAIN: lynx-singular-loosely.ngrok-free.app
      CODE_SERVER_PORT: 8080

    steps:
      - name: 🧱 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq zip

      - name: 📥 Attempt to restore workspace
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: code-server-workspace
          path: restore

      - name: 🔓 Unpack previous workspace if found
        run: |
          if [ -f restore/workspace.zip ]; then
            echo "[INFO] Previous workspace found — restoring..."
            unzip -o restore/workspace.zip -d ~/
          else
            echo "[WARN] No prior workspace artifact found — starting fresh."
          fi

      - name: 💻 Install code-server
        run: |
          curl -fsSL https://code-server.dev/install.sh | sh

      - name: ⚙️ Configure code-server
        run: |
          mkdir -p ~/.config/code-server
          echo "bind-addr: 0.0.0.0:$CODE_SERVER_PORT" > ~/.config/code-server/config.yaml
          echo "auth: none" >> ~/.config/code-server/config.yaml
          echo "cert: false" >> ~/.config/code-server/config.yaml

      - name: 🔌 Install ngrok
        run: |
          curl -sLO https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: 🚀 Launch code-server and ngrok tunnel
        run: |
          nohup code-server > code-server.log 2>&1 &
          sleep 5
          nohup ngrok http --domain=$NGROK_DOMAIN $CODE_SERVER_PORT > ngrok.log 2>&1 &
          sleep 10
          echo "🔗 Tunnel live at: https://$NGROK_DOMAIN"
          curl -s localhost:4040/api/tunnels | jq || echo "[WARN] Tunnel metadata not available"

      - name: 📦 Create timestamped workspace snapshot
        run: |
          mkdir -p ~/.local/share/code-server
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          echo "[INFO] Creating snapshot: workspace-$TIMESTAMP.zip"
          zip -r "workspace-$TIMESTAMP.zip" ~/.local/share/code-server -x '*.sock' || echo "[WARN] Snapshot completed with warnings"

      - name: 🛠️ Upload workspace snapshot
        uses: actions/upload-artifact@v4
        with:
          name: code-server-workspace
          path: workspace-*.zip

      - name: 📩 Send Discord save button
        run: |
          curl -X POST https://discord.com/api/webhooks/1393520015600390165/1eV2Yjf8KnG1l4-93tAoxMEhZxBO9zyTMvWbAkwjDluO5cuhdgeIrdgqHf5O5KWHgyR9 \
            -H "Content-Type: application/json" \
            -d '{
              "content": "📦 Snapshot created. Click below to manually trigger another save:",
              "components": [{
                "type": 1,
                "components": [{
                  "type": 2,
                  "style": 5,
                  "label": "Save Workspace",
                  "url": "https://github.com/MujtabaG45/Coding/actions/workflows/code-server-snapshot.yml"
                }]
              }]
            }'

      - name: 🧬 Keep workflow alive
        run: tail -f /dev/null
