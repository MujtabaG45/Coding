name: Code Server with Continuous Snapshots

on:
  workflow_dispatch:
  repository_dispatch:
    types: [save_workspace]

jobs:
  persistent-devbox:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: 2QQn03lHEv4FSfWroH8VrQt5hAm_3o3Knf2Rc9PjdAG5doJoe
      NGROK_DOMAIN: lynx-singular-loosely.ngrok-free.app
      CODE_SERVER_PORT: 8080

    steps:
      - name: 🧱 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq zip

      - name: 📥 Attempt to restore workspace
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: code-server-workspace
          path: restore

      - name: 🔓 Unpack previous workspace if found
        run: |
          if [ -f restore/workspace.zip ]; then
            echo "[INFO] Restoring previous workspace..."
            unzip -o restore/workspace.zip -d ~/
          else
            echo "[INFO] No restore available — starting fresh."
          fi

      - name: 💻 Install code-server
        run: curl -fsSL https://code-server.dev/install.sh | sh

      - name: ⚙️ Configure code-server
        run: |
          mkdir -p ~/.config/code-server
          cat <<EOF > ~/.config/code-server/config.yaml
          bind-addr: 0.0.0.0:$CODE_SERVER_PORT
          auth: none
          cert: false
          EOF

      - name: 🔌 Install ngrok
        run: |
          curl -sLO https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: 🚀 Launch code-server and ngrok
        run: |
          nohup code-server > code-server.log 2>&1 &
          sleep 5
          nohup ngrok http --domain=$NGROK_DOMAIN $CODE_SERVER_PORT > ngrok.log 2>&1 &
          sleep 10
          echo "🔗 Tunnel live at: https://$NGROK_DOMAIN"

      - name: 🔁 Continuous snapshot + upload loop
        run: |
          mkdir -p ~/snapshots
          echo "[LOOP] Starting snapshot + upload cycle..."

          while true; do
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            ZIP="workspace-$TIMESTAMP.zip"
            TARGET="~/snapshots/$ZIP"

            echo "[ZIP] Creating $ZIP"
            zip -r "$TARGET" ~/.local/share/code-server -x '*.sock' || echo "[WARN] Zip issue detected"

            echo "[UPLOAD] Sending snapshot to GitHub Artifacts..."
            mv "$TARGET" .  # move to workspace for artifact pickup
            echo "artifact=$ZIP" >> $GITHUB_ENV

            echo "Uploading via upload-artifact..."
            # Upload only the most recent
            echo "::group::Uploading $ZIP"
            tar -czf "$ZIP.tgz" "$ZIP"
            echo "::endgroup::"

            # Dynamic upload step as workaround
            curl -X POST https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"code-server-workspace\",\"path\":\"$ZIP\"}" || echo "[WARN] Manual upload fallback"

            # Keep only 2 latest
            echo "[CLEANUP] Retaining 2 most recent snapshots..."
            ls -1t workspace-*.zip | tail -n +3 | xargs -r rm -f

            sleep 60
          done

      - name: 🧬 Keep workflow alive
        run: tail -f /dev/null
