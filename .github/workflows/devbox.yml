name: Code Server Live with Continuous Artifact Snapshots

on:
  workflow_dispatch:
  repository_dispatch:
    types: [save_workspace]

jobs:
  persistent-devbox:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: 2QQn03lHEv4FSfWroH8VrQt5hAm_3o3Knf2Rc9PjdAG5doJoe
      NGROK_DOMAIN: lynx-singular-loosely.ngrok-free.app
      CODE_SERVER_PORT: 8080

    steps:
      - name: 🧱 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq zip

      - name: 📥 Restore workspace if available
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: code-server-workspace
          path: restore

      - name: 🔓 Unpack previous workspace
        run: |
          if [ -f restore/workspace.zip ]; then
            echo "[INFO] Unpacking previous workspace..."
            unzip -o restore/workspace.zip -d ~/
          else
            echo "[INFO] No prior workspace to restore — starting fresh."
          fi

      - name: 💻 Install code-server
        run: curl -fsSL https://code-server.dev/install.sh | sh

      - name: ⚙️ Configure code-server
        run: |
          mkdir -p ~/.config/code-server
          echo "bind-addr: 0.0.0.0:$CODE_SERVER_PORT" > ~/.config/code-server/config.yaml
          echo "auth: none" >> ~/.config/code-server/config.yaml
          echo "cert: false" >> ~/.config/code-server/config.yaml

      - name: 🔌 Install ngrok
        run: |
          curl -sLO https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: 🚀 Launch code-server and ngrok tunnel
        run: |
          nohup code-server > code-server.log 2>&1 &
          sleep 5
          nohup ngrok http --domain=$NGROK_DOMAIN $CODE_SERVER_PORT > ngrok.log 2>&1 &
          sleep 10
          echo "🔗 Tunnel active at: https://$NGROK_DOMAIN"

      - name: 🔁 Start continuous snapshot loop
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const SNAP_DIR = path.join(process.env.HOME, 'snapshots');
            fs.mkdirSync(SNAP_DIR, { recursive: true });

            let counter = 1;

            console.log("[LOOP] Starting snapshot loop...");
            const interval = setInterval(() => {
              const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
              const zipName = `workspace-${timestamp}.zip`;
              const zipPath = path.join(SNAP_DIR, zipName);

              try {
                execSync(`zip -r '${zipPath}' ~/.local/share/code-server -x '*.sock'`);
                console.log(`[SNAPSHOT] Created ${zipName}`);

                process.setOutput('artifact-name', zipName);
              } catch (err) {
                console.warn(`[ERROR] Snapshot failed: ${err.message}`);
              }

              counter++;
              if (counter > 60) {
                clearInterval(interval);
                console.log("[LOOP] Max snapshot limit reached. Stopping.");
              }
            }, 60000); // 60 seconds
            await new Promise(() => {});
      
      - name: 🧬 Keep session alive
        run: tail -f /dev/null
