name: Code Server via Ngrok (Auto-Restore Workspace)

on:
  workflow_dispatch:

jobs:
  launch-devbox:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: 2QQn03lHEv4FSfWroH8VrQt5hAm_3o3Knf2Rc9PjdAG5doJoe
      NGROK_DOMAIN: lynx-singular-loosely.ngrok-free.app
      CODE_SERVER_PORT: 8080

    steps:
      - name: 🧱 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq zip

      - name: 📥 Download latest workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: code-server-workspace
          path: restore

      - name: 🔓 Restore workspace from artifact
        run: |
          echo "[INFO] Restoring workspace..."
          unzip -o restore/workspace.zip -d ~/

      - name: 💻 Install code-server
        run: |
          curl -fsSL https://code-server.dev/install.sh | sh

      - name: ⚙️ Configure code-server (no password)
        run: |
          mkdir -p ~/.config/code-server
          echo "bind-addr: 0.0.0.0:$CODE_SERVER_PORT" > ~/.config/code-server/config.yaml
          echo "auth: none" >> ~/.config/code-server/config.yaml
          echo "cert: false" >> ~/.config/code-server/config.yaml

      - name: 🔌 Install ngrok and apply token
        run: |
          curl -sLO https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.zip
          unzip -o ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: 🚀 Launch code-server & ngrok tunnel
        run: |
          nohup code-server > code-server.log 2>&1 &
          sleep 5
          nohup ngrok http --domain=$NGROK_DOMAIN $CODE_SERVER_PORT > ngrok.log 2>&1 &
          sleep 10
          echo "🔗 Permanent access URL: https://$NGROK_DOMAIN"
          curl -s localhost:4040/api/tunnels | jq

      - name: 📦 Archive code-server workspace
        run: |
          echo "[INFO] Zipping workspace..."
          zip -r workspace.zip ~/.local/share/code-server

      - name: 🛠️ Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-server-workspace
          path: workspace.zip

      - name: 🧬 Keep workflow alive
        run: tail -f /dev/null
