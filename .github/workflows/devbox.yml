name: Remote Devbox SSH

on:
  workflow_dispatch:

jobs:
  start-ssh-tunnel:
    name: Start SSH Tunnel via ngrok
    runs-on: ubuntu-latest

    steps:
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y openssh-server gh
          sudo sed -i 's/#Port 22/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Add public SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

      - name: Install ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update
          sudo apt install -y ngrok
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Start ngrok tunnel for SSH
        run: |
          nohup ngrok tcp 2222 --log=stdout > ngrok.log 2>&1 &
          sleep 5
          echo "🎯 Tunnel address:"
          grep -o 'tcp://[^\"]*' ngrok.log || echo "❌ No tunnel found"

      - name: Clone your workspace repo (or create working dir)
        run: |
          mkdir -p ~/devbox  # replace with git clone if you use a repo
          echo "🔧 Workspace ready at ~/devbox"

      - name: Periodically save snapshot to GitHub Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Starting periodic artifact backup loop..."
          while true; do
            tar -czf devbox.tar.gz ~/devbox
            timestamp=$(date +%s)
            cp devbox.tar.gz devbox-$timestamp.tar.gz
            gh run upload-artifact --name "devbox-$timestamp" devbox-$timestamp.tar.gz || echo "⚠️ Upload failed"
            sleep 60
          done
