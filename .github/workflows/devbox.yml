name: Remote Devbox SSH (localhost.run, nokey)

on:
  workflow_dispatch:

jobs:
  remote-devbox:
    runs-on: ubuntu-latest

    steps:
      - name: Install OpenSSH and GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y openssh-server gh
          sudo sed -i 's/#Port 22/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Start SSH tunnel via localhost.run (nokey, backgrounded)
        run: |
          echo "🌍 Starting SSH reverse tunnel via localhost.run..."
          (
            echo "🎯 Tunnel is ready! Use this to connect:"
            echo "ssh -p 2222 root@$(hostname).localhost.run"
            sleep infinity
          ) | ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 2222:localhost:2222 nokey@localhost.run -T > tunnel.log 2>&1 &

          disown
          sleep 5

      - name: Create devbox workspace
        run: mkdir -p ~/devbox

      - name: Snapshot loop to GitHub Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Uploading periodic snapshots of ~/devbox..."
          while true; do
            tar -czf devbox.tar.gz -C ~/ devbox
            timestamp=$(date +%s)
            cp devbox.tar.gz devbox-$timestamp.tar.gz
            gh run upload-artifact --name "devbox-$timestamp" devbox-$timestamp.tar.gz || echo "⚠️ Artifact upload failed"
            sleep 60
          done
