name: Remote Devbox SSH (localhost.run)

on:
  workflow_dispatch:

jobs:
  start-ssh-tunnel:
    name: Start SSH Tunnel using localhost.run
    runs-on: ubuntu-latest

    steps:
      - name: Install OpenSSH and GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y openssh-server gh
          sudo sed -i 's/#Port 22/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Add public SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

      - name: Start SSH tunnel via localhost.run
        run: |
          echo "🌍 Starting reverse SSH tunnel via localhost.run..."
          nohup ssh -o StrictHostKeyChecking=no -R 2222:localhost:2222 ssh.localhost.run -N > tunnel.log 2>&1 &
          sleep 5

          echo "🔍 Attempting to extract tunnel address..."
          grep -oE "[a-z0-9]+\.localhost\.run" tunnel.log | head -n 1 || {
            echo "❌ Could not detect tunnel address."
            tail -n 20 tunnel.log
            exit 1
          }

      - name: Create working directory
        run: mkdir -p ~/devbox

      - name: Periodically upload to GitHub Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Starting periodic backup loop..."
          while true; do
            tar -czf devbox.tar.gz -C ~/ devbox
            timestamp=$(date +%s)
            cp devbox.tar.gz devbox-$timestamp.tar.gz
            gh run upload-artifact --name "devbox-$timestamp" devbox-$timestamp.tar.gz || echo "⚠️ Upload failed"
            sleep 60
          done
