name: Code Server Live with Continuous Snapshots

on:
  workflow_dispatch:
  repository_dispatch:
    types: [save_workspace]

jobs:
  persistent-devbox:
    runs-on: ubuntu-latest

    env:
      NGROK_AUTH_TOKEN: 2QQn03lHEv4FSfWroH8VrQt5hAm_3o3Knf2Rc9PjdAG5doJoe
      NGROK_DOMAIN: lynx-singular-loosely.ngrok-free.app
      CODE_SERVER_PORT: 8080

    steps:
      - name: 🧱 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip jq zip

      - name: 📥 Attempt to restore workspace
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: code-server-workspace
          path: restore

      - name: 🔓 Unpack previous workspace if found
        run: |
          if [ -f restore/workspace.zip ]; then
            echo "[INFO] Previous workspace found — restoring..."
            unzip -o restore/workspace.zip -d ~/
          else
            echo "[WARN] No prior workspace found — starting fresh."
          fi

      - name: 💻 Install code-server
        run: |
          curl -fsSL https://code-server.dev/install.sh | sh

      - name: ⚙️ Configure code-server
        run: |
          mkdir -p ~/.config/code-server
          echo "bind-addr: 0.0.0.0:$CODE_SERVER_PORT" > ~/.config/code-server/config.yaml
          echo "auth: none" >> ~/.config/code-server/config.yaml
          echo "cert: false" >> ~/.config/code-server/config.yaml

      - name: 🔌 Install ngrok
        run: |
          curl -sLO https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.zip
          unzip ngrok-stable-linux-amd64.zip
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: 🚀 Launch code-server and ngrok
        run: |
          nohup code-server > code-server.log 2>&1 &
          sleep 5
          nohup ngrok http --domain=$NGROK_DOMAIN $CODE_SERVER_PORT > ngrok.log 2>&1 &
          sleep 10
          echo "🔗 Tunnel: https://$NGROK_DOMAIN"

      - name: 📦 Begin minute-by-minute snapshot and upload loop
        run: |
          echo "[LOOP] Snapshot + upload loop starting..."
          i=1
          while true; do
            TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
            SNAPFILE="workspace-$TIMESTAMP.zip"
            SNAPDIR="snap-$i"

            mkdir -p $SNAPDIR
            zip -r "$SNAPDIR/$SNAPFILE" ~/.local/share/code-server -x '*.sock' || echo "[WARN] Failed to zip"

            echo "[UPLOAD] Uploading $SNAPFILE as $SNAPDIR artifact..."
            gh api \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              /repos/${{ github.repository }}/actions/artifacts \
              -f name="$SNAPDIR" \
              -f path="$SNAPDIR/$SNAPFILE" || echo "[WARN] Upload failed"

            rm -rf "$SNAPDIR"
            i=$((i+1))
            sleep 60
          done
