name: SSH Devbox with Ngrok

on:
  workflow_dispatch:

jobs:
  ssh-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Set up SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl unzip
          sudo mkdir -p /run/sshd
          sudo sed -i 's/^#Port .*/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication .*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo service ssh restart

      - name: Add SSH public key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

      - name: Install .NET 9 via Microsoft script
        run: |
          curl -sSL https://dotnet.microsoft.com/en-us/download/dotnet/scripts/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 9.0
          echo "$HOME/.dotnet" >> $GITHUB_PATH
          echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV
          $HOME/.dotnet/dotnet --info

      - name: Install Ngrok
        run: |
          curl -sSL https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip -o ngrok.zip
          unzip ngrok.zip
          sudo mv ngrok /usr/local/bin

      - name: Start Ngrok tunnel for SSH
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok authtoken "$NGROK_AUTH_TOKEN"
          ngrok tcp 2222 > ngrok.log &
          sleep 3
          echo "Tunnel address:"
          curl --silent http://localhost:4040/api/tunnels | grep -Po '"public_url":"tcp://\K[^"]+'

      - name: Keep the runner alive
        run: tail -f /dev/null
