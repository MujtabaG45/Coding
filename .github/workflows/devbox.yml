name: SSH Devbox

on:
  workflow_dispatch:

jobs:
  ssh-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Set up SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl
          sudo mkdir -p /run/sshd
          sudo sed -i 's/^#Port .*/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PermitRootLogin .*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication .*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo service ssh start

      - name: Install .NET 9 manually (preview build)
        run: |
          curl -SL https://dotnetcli.azureedge.net/dotnet/Sdk/9.0.100-preview.3/dotnet-sdk-9.0.100-preview.3-linux-x64.tar.gz -o dotnet9.tar.gz
          mkdir -p $HOME/dotnet
          tar -xzf dotnet9.tar.gz -C $HOME/dotnet
          echo "DOTNET_ROOT=$HOME/dotnet" >> $GITHUB_ENV
          echo "$HOME/dotnet" >> $GITHUB_PATH
          $HOME/dotnet/dotnet --info

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

      - name: Show IP
        run: |
          echo "RUNNER IP:"
          curl ifconfig.me

      - name: Keep alive
        run: tail -f /dev/null
