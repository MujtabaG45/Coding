name: Remote Devbox SSH (localhost.run)

on:
  workflow_dispatch:

jobs:
  remote-devbox:
    runs-on: ubuntu-latest

    steps:
      - name: Install OpenSSH and GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y openssh-server gh
          sudo sed -i 's/#Port 22/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Add public SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys

      - name: Start SSH tunnel via localhost.run and show address
        run: |
          echo "🌍 Starting SSH reverse tunnel via localhost.run..."
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R 2222:localhost:2222 ssh.localhost.run -N -v 2>&1 | tee tunnel.log &
          sleep 5
          
          echo "🔍 Looking for tunnel address..."
          for i in {1..10}; do
            sleep 2
            subdomain=$(grep -oE '[a-z0-9]{6,}\.localhost\.run' tunnel.log | head -n 1)
            if [[ -n "$subdomain" ]]; then
              echo "🎯 SSH into your devbox with:"
              echo "ssh -p 2222 root@$subdomain"
              break
            fi
          done

          if [[ -z "$subdomain" ]]; then
            echo "❌ Could not detect tunnel address. Here's the log tail:"
            tail -n 30 tunnel.log
            exit 1
          fi

      - name: Create devbox workspace
        run: mkdir -p ~/devbox

      - name: Snapshot loop to GitHub Artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Uploading periodic snapshots of ~/devbox..."
          while true; do
            tar -czf devbox.tar.gz -C ~/ devbox
            timestamp=$(date +%s)
            cp devbox.tar.gz devbox-$timestamp.tar.gz
            gh run upload-artifact --name "devbox-$timestamp" devbox-$timestamp.tar.gz || echo "⚠️ Artifact upload failed"
            sleep 60
          done
