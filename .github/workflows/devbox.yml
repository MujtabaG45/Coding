name: SSH Devbox with Ngrok + GitHub Push

on:
  workflow_dispatch:

jobs:
  ssh-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Set up SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl unzip
          sudo mkdir -p /run/sshd
          echo 'Port 2222' | sudo tee -a /etc/ssh/sshd_config
          echo 'PermitRootLogin yes' | sudo tee -a /etc/ssh/sshd_config
          echo 'PasswordAuthentication no' | sudo tee -a /etc/ssh/sshd_config
          sudo /usr/sbin/sshd -D &   # run sshd in background
          sleep 3
          sudo ss -tulpen | grep :2222 || echo "⚠️ SSH not listening"

      - name: Add SSH public key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

      - name: Install .NET 9 via Microsoft script
        run: |
          curl -sSL https://dotnet.microsoft.com/en-us/download/dotnet/scripts/v1/dotnet-install.sh -o dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 9.0
          echo "$HOME/.dotnet" >> $GITHUB_PATH
          echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV
          $HOME/.dotnet/dotnet --info

      - name: Install and launch Ngrok tunnel (v3)
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"
          ngrok tcp 2222 --log=stdout > ngrok.log &
          sleep 5
          echo -n "Tunnel address: "
          grep -oP 'url=tcp://\K[\w\.-]+:\d+' ngrok.log || echo "Could not parse tunnel address."

      - name: Auto-init Git project and push to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          cd ~
          mkdir auto-devbox && cd auto-devbox
          git init
          echo "# Auto Devbox" > README.md
          git config --global user.name "$GH_USERNAME"
          git config --global user.email "$GH_USERNAME@users.noreply.github.com"

          echo "Creating GitHub repo..."
          curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/repos \
            -d '{"name":"auto-devbox","private":true}' || true

          git remote add origin "https://$GH_USERNAME:$GH_TOKEN@github.com/$GH_USERNAME/auto-devbox.git"
          git add .
          git commit -m "Initial auto commit"
          git push -u origin master || echo "⚠️ Push skipped or failed"

      - name: Keep the runner alive
        run: tail -f /dev/null
